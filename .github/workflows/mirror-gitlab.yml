name: Mirror to GitLab

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: mirror-gitlab
  cancel-in-progress: false

jobs:
  mirror:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push main to GitLab
        env:
          GITLAB_TOKEN: ${{ secrets.GITLAB_MIRROR_TOKEN }}
        run: |
          git remote add gitlab \
            "https://oauth2:${GITLAB_TOKEN}@gitlab.com/ryansen/qmog-cpp.git"
          git fetch gitlab main
          git push gitlab main:main
